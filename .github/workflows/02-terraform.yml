name: "Phase 2: Infrastructure Validation"

on:
  workflow_call:
  workflow_dispatch:

jobs:
  infra:
    name: "Terraform Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: "Ensure Terraform State S3 Bucket Exists"
        run: |
          BUCKET_NAME="shopsmart-terraform-state-mayank"
          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME already exists."
          else
            echo "Bucket $BUCKET_NAME does not exist. Attempting to create it..."
            if [ "${{ secrets.AWS_REGION || 'us-east-1' }}" == "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region ${{ secrets.AWS_REGION || 'us-east-1' }}
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region ${{ secrets.AWS_REGION || 'us-east-1' }} --create-bucket-configuration LocationConstraint=${{ secrets.AWS_REGION || 'us-east-1' }}
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
          fi

      - name: "Terraform Init"
        working-directory: ./terraform
        run: terraform init

      - name: "Terraform Validate"
        working-directory: ./terraform
        run: terraform validate

      - name: "Terraform Plan"
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: "Terraform Apply"
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan
