name: EC2 Deployment (Docker Hub)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-server:latest

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-client:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create app directory if it doesn't exist
            mkdir -p ~/shopsmart
            cd ~/shopsmart
            
            # Create a simple docker-compose.yml on the server if it doesn't exist
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              server:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-server:latest
                ports:
                  - "5001:5001"
                environment:
                  - DATABASE_URL=${{ secrets.DATABASE_URL }}
                  - NODE_ENV=production
              client:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-client:latest
                ports:
                  - "3000:3000"
                environment:
                  - NEXT_PUBLIC_LOCAL_BACKEND_URL=http://\${{ secrets.EC2_HOST }}:5001/api
                  - NODE_ENV=production
            EOF

            # Pull latest images and restart containers
            sudo docker compose pull
            sudo docker compose up -d
