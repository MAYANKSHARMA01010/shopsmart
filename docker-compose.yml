services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopsmart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopsmart"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopsmart-net

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopsmart-net

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/shopsmart
      REDIS_LOCAL_URL: redis://redis:6379
      NODE_ENV: production
      FRONTEND_LOCAL_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shopsmart-net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_LOCAL_BACKEND_URL: http://localhost:5001/api
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - shopsmart-net

networks:
  shopsmart-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data: